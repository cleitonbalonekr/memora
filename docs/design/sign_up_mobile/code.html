<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Sign Up - Flashcards AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#777587",
                        "on-tertiary-fixed-variant": "#92002a",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eceef0",
                        "secondary": "#006c49",
                        "on-tertiary-container": "#ffd0d2",
                        "on-primary-container": "#dad7ff",
                        "tertiary-fixed": "#ffdadb",
                        "on-primary-fixed-variant": "#3323cc",
                        "tertiary": "#95002b",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed": "#002113",
                        "inverse-surface": "#2d3133",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-fixed": "#0f0069",
                        "on-tertiary-fixed": "#40000d",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-container": "#6cf8bb",
                        "primary-container": "#4f46e5",
                        "outline-variant": "#c7c4d8",
                        "primary-fixed": "#e2dfff",
                        "inverse-on-surface": "#eff1f3",
                        "on-surface": "#191c1e",
                        "on-background": "#191c1e",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#4edea3",
                        "inverse-primary": "#c3c0ff",
                        "on-secondary-container": "#00714d",
                        "on-surface-variant": "#464555",
                        "surface": "#f7f9fb",
                        "error": "#ba1a1a",
                        "tertiary-container": "#bf0f3c",
                        "surface-bright": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "background": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-variant": "#e0e3e5",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#3525cd",
                        "surface-tint": "#4d44e3",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "md": "16px",
                        "margin-desktop": "auto",
                        "sm": "8px",
                        "max-width-content": "600px",
                        "margin-mobile": "20px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],

                }

<style>
        body {
            background-color: #F8FAFC; /* Neutral background from Style Guidance */
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom form ring color matching primary Indigo */
        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 2px #3525cd !important;
            border-color: #3525cd !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center font-body-md">
<!-- Top App Bar (Modified for transactional screen - hidden nav icons, brand only) -->
<header class="fixed top-0 w-full max-w-max-width-content mx-auto h-16 flex items-center justify-center px-margin-mobile bg-surface/80 backdrop-blur-md z-40">
<div class="font-headline-sm-mobile text-headline-sm-mobile font-bold text-primary flex items-center gap-xs">
<span class="material-symbols-outlined" data-icon="menu_book" data-weight="fill" style="font-variation-settings: 'FILL' 1;">menu_book</span>
            Flashcards AI
        </div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-max-width-content px-margin-mobile pt-[88px] pb-xl flex-grow flex flex-col justify-center">
<!-- Header Section -->
<div class="mb-lg text-center">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-sm">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join 10,000+ students mastering their subjects faster.</p>
</div>
<!-- Social Signup (Google) -->
<button class="w-full h-[48px] bg-surface-container-lowest border border-outline-variant rounded-lg flex items-center justify-center gap-sm mb-lg shadow-sm hover:bg-surface-container-low transition-colors duration-200 active:scale-95">
<!-- Fallback generic icon since standard material symbols doesn't have brand logos reliably, using a generic 'person' as a placeholder for the social button layout -->
<span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
<span class="font-label-md text-label-md text-on-surface">Continue with Google</span>
</button>
<div class="flex items-center w-full mb-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or register with email</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Signup Form -->
<form class="flex flex-col gap-md w-full">
<!-- Full Name Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="fullName">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
<input class="w-full h-[48px] pl-[40px] pr-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="w-full h-[48px] pl-[40px] pr-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="email" name="email" placeholder="jane@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="w-full h-[48px] pl-[40px] pr-[40px] bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Terms & Privacy Checkbox -->
<div class="flex items-start gap-sm mt-xs">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer mt-0.5" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-tight" for="terms">
                    I agree to the <a class="text-primary hover:underline font-semibold" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-semibold" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Primary Action Button -->
<button class="w-full h-[56px] mt-sm bg-primary text-on-primary font-headline-sm-mobile text-headline-sm-mobile rounded-xl shadow-[0px_4px_20px_rgba(53,37,205,0.25)] hover:bg-surface-tint active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-xs" type="submit">
                Create Account
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Log In</a>
</p>
</div>
</main>
<!-- Suppressed BottomNavBar: This is a linear transactional screen (Sign-up), so navigation is hidden according to rules. -->
<script>
        // Simple script to toggle password visibility
        document.addEventListener('DOMContentLoaded', () => {
            const togglePasswordBtn = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = togglePasswordBtn.querySelector('.material-symbols-outlined');

            togglePasswordBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    iconSpan.textContent = 'visibility';
                    iconSpan.setAttribute('data-icon', 'visibility');
                } else {
                    passwordInput.type = 'password';
                    iconSpan.textContent = 'visibility_off';
                    iconSpan.setAttribute('data-icon', 'visibility_off');
                }
            });
        });
    </script>
</body></html>
