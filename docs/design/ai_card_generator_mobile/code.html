<script>
        // Simple script to toggle active state visually for the custom toggles
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', function() {
                const card = this.closest('.group, .opacity-60');
                const label = this.nextElementSibling;
                
                if(this.checked) {
                    this.classList.replace('translate-x-0', 'translate-x-5');
                    this.classList.replace('border-outline-variant', 'border-primary');
                    label.classList.replace('bg-outline-variant', 'bg-primary');
                    
                    if(card) {
                        card.classList.replace('opacity-60', 'group');
                        card.classList.replace('bg-surface-container', 'bg-surface-container-lowest');
                        card.classList.add('shadow-sm', 'hover:shadow-md');
                        const inputs = card.querySelectorAll('input[type="text"], textarea');
                        inputs.forEach(i => {
                            i.disabled = false;
                            i.classList.replace('bg-surface-container', 'bg-surface');
                            i.classList.replace('text-outline', 'text-on-surface');
                        });
                        const dragText = card.querySelector('.text-outline.uppercase');
                        if(dragText) dragText.classList.replace('text-outline', 'text-primary');
                    }
                } else {
                    this.classList.replace('translate-x-5', 'translate-x-0');
                    this.classList.replace('border-primary', 'border-outline-variant');
                    label.classList.replace('bg-primary', 'bg-outline-variant');
                    
                    if(card) {
                        card.classList.replace('group', 'opacity-60');
                        card.classList.replace('bg-surface-container-lowest', 'bg-surface-container');
                        card.classList.remove('shadow-sm', 'hover:shadow-md');
                        const inputs = card.querySelectorAll('input[type="text"], textarea');
                        inputs.forEach(i => {
                            i.disabled = true;
                            i.classList.replace('bg-surface', 'bg-surface-container');
                            i.classList.replace('text-on-surface', 'text-outline');
                        });
                        const dragText = card.querySelector('.text-primary.uppercase');
                        if(dragText) dragText.classList.replace('text-primary', 'text-outline');
                    }
                }
            });
        });
    </script>
