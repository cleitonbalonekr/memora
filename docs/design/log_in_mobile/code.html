<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Container - Mobile First Focus -->
<main class="w-full max-w-max-width-content px-margin-mobile flex flex-col md:h-screen md:justify-center py-xl">
<!-- Brand Header -->
<header class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                    menu_book
                </span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary text-center mb-xs">Flashcards AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Welcome back. Ready to focus?</p>
</header>
<!-- Login Form -->
<form class="flex flex-col w-full bg-surface-container-lowest p-md md:p-lg rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<!-- Email Input -->
<div class="flex flex-col mb-md">
<label class="font-label-sm text-label-sm text-on-surface mb-xs" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant">
                        mail
                    </span>
<input class="w-full pl-[40px] pr-sm py-sm bg-surface rounded-lg border border-outline-variant text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="email" name="email" placeholder="student@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col mb-sm">
<label class="font-label-sm text-label-sm text-on-surface mb-xs" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant">
                        lock
                    </span>
<input class="w-full pl-[40px] pr-sm py-sm bg-surface rounded-lg border border-outline-variant text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mb-lg">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-sm rounded-lg shadow-md hover:bg-surface-tint active:scale-95 transition-all flex justify-center items-center gap-xs" type="submit">
                Log In
                <span class="material-symbols-outlined text-on-primary" style="font-size: 20px;">
                    arrow_forward
                </span>
</button>
<div class="relative flex py-md items-center mt-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-sm font-label-sm text-label-sm text-on-surface-variant">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-surface text-on-surface font-label-md text-label-md py-sm rounded-lg border border-outline-variant hover:bg-surface-container-low active:scale-95 transition-all flex justify-center items-center gap-sm" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path><path d="M1 1h22v22H1z" fill="none"></path></svg>
                Continue with Google
            </button>
<!-- Sign Up Link -->
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-lg">
                Don't have an account? <a class="text-primary font-bold hover:underline transition-all" href="#">Sign up</a>
</p>
</form>
</main>
<script>
        // Simple input focus effects for accessibility and visual feedback
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', (e) => {
                const icon = e.target.previousElementSibling;
                if(icon && icon.classList.contains('material-symbols-outlined')){
                    icon.classList.remove('text-on-surface-variant');
                    icon.classList.add('text-primary');
                }
            });
            input.addEventListener('blur', (e) => {
                const icon = e.target.previousElementSibling;
                if(icon && icon.classList.contains('material-symbols-outlined')){
                    icon.classList.remove('text-primary');
                    icon.classList.add('text-on-surface-variant');
                }
            });
        });
    </script>
