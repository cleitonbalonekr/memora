# Ephemeral test stack: the two Supabase services this app uses (Postgres + Auth)
# behind a tiny gateway. No volumes — every `up` starts from a clean database.
# Ports are offset (54322 / 54321) so this can run alongside the local dev stack.
#
# Dev-only credentials below are the well-known Supabase local demo values. They
# are NOT production secrets and are safe to commit (see AGENTS.md security rules).
services:
  db:
    image: postgres:16-alpine
    container_name: memora-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    volumes:
      - ./docker/init-auth.sql:/docker-entrypoint-initdb.d/init-auth.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

  auth:
    image: supabase/gotrue:v2.189.0
    container_name: memora-test-auth
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"

  gateway:
    image: nginx:1-alpine
    container_name: memora-test-gateway
    depends_on:
      - auth
    ports:
      - "54321:8000"
    volumes:
      - ./docker/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
