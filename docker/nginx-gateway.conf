# Minimal API gateway: routes Supabase auth calls to GoTrue.
# @supabase/supabase-js and @supabase/ssr call `${SUPABASE_URL}/auth/v1/*`.
# The trailing slash on proxy_pass strips the `/auth/v1/` prefix, so
# `/auth/v1/token` is forwarded to GoTrue as `/token`.
server {
  listen 8000;
  server_name _;

  location /auth/v1/ {
    proxy_pass http://auth:9999/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
